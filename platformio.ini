[common]
platform      = espressif32
framework     = arduino
monitor_speed = 115200

# ── ESP32 #1: Reader — ESP32 Wrover-E ────────────────────────
# GPIO16/17はPSRAMと競合する可能性があるためGPIO25/26を使用
[env:reader]
extends          = common
board            = esp32dev
lib_deps         = bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<reader/>

# ── ESP32 #2: Server — XIAO ESP32-S3 ─────────────────────────
[env:server]
extends                = common
board                  = seeed_xiao_esp32s3
board_build.filesystem = littlefs
extra_scripts          = pre:scripts/pre_upload.py
lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<server/>
