[common]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200

# ── ESP32 #1: Reader (Promiscuous受信専用) ────────────────────
[env:reader]
extends          = common
lib_deps         = bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<reader/>

# ── ESP32 #2: Server (WiFi AP + WebSocket + Web UI) ──────────
[env:server]
extends                = common
board_build.filesystem = littlefs
extra_scripts          = pre:scripts/pre_upload.py
lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<server/>
