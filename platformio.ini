; ELRS Backpack Lap Timer — PlatformIO configuration
;
; Two environments:
;   gate_node : ESP32-WROVER-E-A  — Promiscuous/RSSI node (no WiFi AP)
;   web_node  : XIAO ESP32-S3-B   — WiFi AP + Web UI node

[common]
monitor_speed = 115200
lib_ldf_mode = deep+

; ─────────────────────────────────────────────
; Gate Node  (ESP32-WROVER-E)
; ─────────────────────────────────────────────
[env:gate_node]
platform  = espressif32
board     = esp32dev
framework = arduino
build_src_filter = +<gate_node/>
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; ─────────────────────────────────────────────
; Web Node  (XIAO ESP32-S3)
; ─────────────────────────────────────────────
[env:web_node]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
build_src_filter = +<web_node/>
board_build.filesystem = littlefs
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.3.0
    bblanchon/ArduinoJson @ ^7.0.0
