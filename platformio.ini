[common]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200

# ── ESP32 #1: Reader (Promiscuous受信専用) ────────────────────
[env:reader]
extends          = common
lib_deps         = bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<reader/>

# ── ESP32 #2: Server (WiFi AP + WebSocket + Web UI) ──────────
[env:server]
extends                = common
board_build.filesystem = littlefs
lib_deps =
    me-no-dev/AsyncTCP
    me-no-dev/ESP Async WebServer
    bblanchon/ArduinoJson@^7.0.0
build_src_filter = -<*> +<server/>
